<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIYAMBOSS - Admin Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #f3ba2f; --bg: #0b0e11; --card: #1e2329; --border: #323539; --green: #2ebd85; --red: #f6465d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        
        .header { text-align: center; padding: 20px; border-bottom: 2px solid var(--gold); margin-bottom: 30px; }
        .admin-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        h3 { color: var(--gold); margin-top: 0; display: flex; align-items: center; gap: 10px; font-size: 18px; }
        
        input, textarea, select { width: 100%; padding: 12px; background: #2b2f36; border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 5px; }
        .btn-main { background: var(--gold); color: #000; }
        .btn-msg { background: #5d5fef; color: #fff; }
        .btn-del { background: var(--red); color: #fff; }
        
        .item-list { background: #0b0e11; padding: 10px; border-radius: 10px; margin-top: 10px; max-height: 250px; overflow-y: auto; }
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; font-size: 13px; }
        .list-row:last-child { border-bottom: none; }
        
        .status-btn { padding: 5px 10px; border-radius: 5px; font-size: 11px; margin-left: 5px; }
        .approve { background: var(--green); color: #fff; }
        .reject { background: var(--red); color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-tools"></i> SIYAMBOSS MASTER PANEL</h1>
        <p style="color: var(--text-gray);">Manage Tasks, Users & Payouts</p>
    </div>

    <div class="admin-container">
        
        <div class="card">
            <h3><i class="fas fa-bullhorn"></i> Global Notification (SMS)</h3>
            <p style="font-size: 11px; color: #888;">এটি আপডেট করলে সব ইউজারের কাছে মেসেজ চলে যাবে।</p>
            <textarea id="broadcastMsg" placeholder="ইউজারদের জন্য কোনো বিশেষ বার্তা লিখুন..."></textarea>
            <button class="btn-msg" onclick="sendBroadcast()">SEND BROADCAST</button>
            <button class="btn-del" onclick="clearBroadcast()" style="margin-top:5px; background: #444;">HIDE MESSAGE</button>
        </div>

        <div class="card">
            <h3><i class="fas fa-plus-square"></i> Add New Mining Task</h3>
            <input type="text" id="tTitle" placeholder="Task Name (Example: Join Group)">
            <input type="text" id="tLink" placeholder="Link (Telegram/YouTube)">
            <input type="number" step="0.0001" id="tReward" placeholder="Reward Amount ($)">
            <input type="number" id="tTarget" placeholder="Target Members">
            <button class="btn-main" onclick="addTask()">ADD TASK NOW</button>
        </div>

        <div class="card">
            <h3><i class="fas fa-wallet"></i> Pending Withdrawals</h3>
            <div class="item-list" id="payoutList">
                <p style="text-align:center; color:#555;">No pending requests</p>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-user-edit"></i> Modify User Balance</h3>
            <input type="text" id="searchUser" placeholder="User Telegram ID">
            <input type="number" step="0.0001" id="newBal" placeholder="Set New Balance ($)">
            <button class="btn-main" onclick="updateUserBalance()">UPDATE BALANCE</button>
        </div>

    </div>

    <div class="card" style="margin-top: 20px;">
        <h3><i class="fas fa-tasks"></i> Active Task Management</h3>
        <div id="adminTaskList" class="item-list"></div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAMFOgXzlihlgrKgrVR5puOA7tE9_0KAIY",
            databaseURL: "https://free-income-8a793-default-rtdb.firebaseio.com",
            projectId: "free-income-8a793"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ১. নোটিফিকেশন পাঠানো
        function sendBroadcast() {
            const msg = document.getElementById('broadcastMsg').value;
            if(!msg) return alert("মেসেজ লিখুন!");
            db.ref('broadcast').set(msg).then(() => alert("নোটিফিকেশন পাঠানো হয়েছে!"));
        }

        function clearBroadcast() {
            db.ref('broadcast').set(null).then(() => alert("নোটিফিকেশন হাইড করা হয়েছে।"));
        }

        // ২. টাস্ক যোগ করা
        function addTask() {
            const title = document.getElementById('tTitle').value;
            const link = document.getElementById('tLink').value;
            const reward = parseFloat(document.getElementById('tReward').value);
            const target = parseInt(document.getElementById('tTarget').value);

            if(!title || !link || !reward) return alert("সব ঘর পূরণ করুন!");

            db.ref('tasks').push({
                title, link, reward, targetMembers: target,
                completedCount: 0, status: "on"
            }).then(() => {
                alert("টাস্ক সফলভাবে যোগ হয়েছে!");
                location.reload();
            });
        }

        // ৩. পেমেন্ট লিস্ট লোড ও আপডেট
        db.ref('withdrawals').on('value', s => {
            const list = document.getElementById('payoutList');
            list.innerHTML = "";
            s.forEach(child => {
                const w = child.val();
                if(w.status === "Pending") {
                    list.innerHTML += `
                        <div class="list-row">
                            <div><b>${w.userName}</b><br><small>${w.exchange}: ${w.address}<br>$${w.amount}</small></div>
                            <div>
                                <button class="status-btn approve" onclick="payoutAction('${child.key}', 'Approved')">OK</button>
                                <button class="status-btn reject" onclick="payoutAction('${child.key}', 'Rejected')">X</button>
                            </div>
                        </div>`;
                }
            });
        });

        function payoutAction(id, status) {
            db.ref('withdrawals/' + id).update({ status: status })
            .then(() => alert("Status updated to: " + status));
        }

        // ৪. ইউজার ব্যালেন্স আপডেট
        function updateUserBalance() {
            const uid = document.getElementById('searchUser').value;
            const bal = parseFloat(document.getElementById('newBal').value);
            if(!uid || isNaN(bal)) return alert("সঠিক আইডি ও ব্যালেন্স দিন!");
            db.ref('users/' + uid).update({ balance: bal })
            .then(() => alert("ব্যালেন্স আপডেট করা হয়েছে!"));
        }

        // ৫. একটিভ টাস্ক ম্যানেজমেন্ট
        db.ref('tasks').on('value', s => {
            const list = document.getElementById('adminTaskList');
            list.innerHTML = "";
            s.forEach(child => {
                const t = child.val();
                list.innerHTML += `
                    <div class="list-row">
                        <span>${t.title} ($${t.reward}) [${t.completedCount}/${t.targetMembers}]</span>
                        <button class="status-btn reject" onclick="deleteTask('${child.key}')">DELETE</button>
                    </div>`;
            });
        });

        function deleteTask(id) {
            if(confirm("টাস্কটি ডিলিট করতে চান?")) db.ref('tasks/' + id).remove();
        }

    </script>
</body>
</html>
