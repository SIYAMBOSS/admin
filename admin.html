<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIYAMBOSS - Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #0b0e11; color: #fff; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { background: #1e2329; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .gold { color: #f3ba2f; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #2b2f36; color: #f3ba2f; }
        button { cursor: pointer; border: none; border-radius: 5px; padding: 5px 10px; font-weight: bold; }
        .btn-approve { background: #2ebd85; color: #fff; margin-right: 5px; }
        .btn-reject { background: #f6465d; color: #fff; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; background: #2b2f36; border: 1px solid #444; color: #fff; border-radius: 5px; }
        .form-section { background: #181a20; padding: 20px; border-radius: 10px; border: 1px solid #f3ba2f; margin-bottom: 30px; }
    </style>
</head>
<body>

    <h2 class="gold"><i class="fas fa-user-shield"></i> SIYAMBOSS Admin</h2>

    <div class="grid">
        <div class="card">
            <small>Total Users</small>
            <h2 id="totalUsers" class="gold">0</h2>
        </div>
        <div class="card">
            <small>Pending Withdrawals</small>
            <h2 id="pendingCount" style="color: #f6465d;">0</h2>
        </div>
    </div>

    <div class="form-section">
        <h3 class="gold">Add New Task / Update</h3>
        <label>Task Title</label>
        <input type="text" id="taskTitle" placeholder="e.g. Join Telegram">
        <label>Reward (USD)</label>
        <input type="number" id="taskReward" step="0.01" placeholder="0.10">
        <label>Task Link</label>
        <input type="text" id="taskLink" placeholder="https://t.me/...">
        <button class="btn-approve" style="width: 100%; padding: 12px;" onclick="addTask()">ADD TASK</button>
    </div>

    <div class="card" style="margin-bottom: 30px;">
        <h3 class="gold"><i class="fas fa-chart-line"></i> Task Completion Stats</h3>
        <table>
            <thead>
                <tr>
                    <th>Task Name</th>
                    <th>Reward</th>
                    <th>Completed By</th>
                </tr>
            </thead>
            <tbody id="taskStatsTable"></tbody>
        </table>
    </div>

    <div class="card">
        <h3 style="color: #f3ba2f;"><i class="fas fa-wallet"></i> Pending Requests</h3>
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Method</th>
                    <th>UID/Gmail</th>
                    <th>Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="withdrawTable"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAMFOgXzlihlgrKgrVR5puOA7tE9_0KAIY",
            databaseURL: "https://free-income-8a793-default-rtdb.firebaseio.com",
            projectId: "free-income-8a793"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Load Stats & Data
        function loadAdminData() {
            // Count Total Users
            db.ref('users').on('value', s => {
                document.getElementById('totalUsers').innerText = s.numChildren();
            });

            // Load Withdrawals
            db.ref('withdrawals').on('value', s => {
                const list = document.getElementById('withdrawTable');
                list.innerHTML = "";
                let pending = 0;
                
                s.forEach(child => {
                    const data = child.val();
                    if(data.status === "Pending") {
                        pending++;
                        list.innerHTML += `
                            <tr>
                                <td>${data.userName}</td>
                                <td>${data.exchange}</td>
                                <td>${data.address}</td>
                                <td>$${data.amount}</td>
                                <td>
                                    <button class="btn-approve" onclick="updateWithdraw('${child.key}', 'Approved')">Approve</button>
                                    <button class="btn-reject" onclick="updateWithdraw('${child.key}', 'Rejected')">Reject</button>
                                </td>
                            </tr>
                        `;
                    }
                });
                document.getElementById('pendingCount').innerText = pending;
            });

            // Load Task Stats
            db.ref('tasks').on('value', s => {
                const taskTable = document.getElementById('taskStatsTable');
                taskTable.innerHTML = "";
                s.forEach(child => {
                    const task = child.val();
                    taskTable.innerHTML += `
                        <tr>
                            <td>${task.title}</td>
                            <td>$${task.reward}</td>
                            <td class="gold"><b>${task.completedCount || 0} Users</b></td>
                        </tr>
                    `;
                });
            });
        }

        // Add Task Function
        function addTask() {
            const title = document.getElementById('taskTitle').value;
            const reward = document.getElementById('taskReward').value;
            const link = document.getElementById('taskLink').value;

            if(!title || !reward) return alert("Fill data");

            db.ref('tasks').push({
                title, reward: parseFloat(reward), link, completedCount: 0
            }).then(() => {
                alert("Task Added!");
                document.getElementById('taskTitle').value = "";
            });
        }

        // Approve/Reject Function
        function updateWithdraw(key, status) {
            db.ref('withdrawals/' + key).update({ status: status })
            .then(() => alert("Request " + status));
        }

        loadAdminData();
    </script>
</body>
</html>
