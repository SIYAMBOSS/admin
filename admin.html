<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIYAMBOSS Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #16213e; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #00d2ff; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; }
        input { width: 95%; padding: 10px; border-radius: 8px; border: none; outline: none; background: #0f3460; color: white; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #00d2ff; color: #1a1a2e; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0088cc; color: white; }
        .task-list { margin-top: 20px; }
        .task-item { background: #0f3460; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #e94560; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Admin Control</h2>
    <div class="input-group">
        <label>Task Name</label>
        <input type="text" id="tName" placeholder="Ex: YouTube Subscribe">
    </div>
    <div class="input-group">
        <label>Task Link</label>
        <input type="text" id="tLink" placeholder="https://youtube.com/...">
    </div>
    <div class="input-group">
        <label>Reward (TK)</label>
        <input type="number" id="tReward" placeholder="Ex: 5">
    </div>
    <button onclick="saveTask()">Add New Task</button>

    <hr style="margin: 25px 0; border: 0.5px solid #0f3460;">
    <h3>Active Tasks</h3>
    <div id="taskList" class="task-list"></div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAMFOgXzlihlgrKgrVR5puOA7tE9_0KAIY",
        databaseURL: "https://free-income-8a793-default-rtdb.firebaseio.com",
        projectId: "free-income-8a793",
        appId: "1:37795835352:web:1db880cc34091466f796ad"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Task Save Function
    function saveTask() {
        const name = document.getElementById('tName').value;
        const link = document.getElementById('tLink').value;
        const reward = document.getElementById('tReward').value;

        if(name && link && reward) {
            db.ref('tasks').push({
                name: name,
                link: link,
                reward: parseFloat(reward)
            }).then(() => {
                alert("Task Successfully Added!");
                document.getElementById('tName').value = "";
                document.getElementById('tLink').value = "";
                document.getElementById('tReward').value = "";
            });
        } else {
            alert("All fields are required!");
        }
    }

    // Task List Show & Delete
    db.ref('tasks').on('value', (snap) => {
        const tasks = snap.val();
        const listDiv = document.getElementById('taskList');
        listDiv.innerHTML = "";
        for(let id in tasks) {
            listDiv.innerHTML += `
                <div class="task-item">
                    <span>${tasks[id].name} - ৳${tasks[id].reward}</span>
                    <button class="delete-btn" onclick="deleteTask('${id}')">Delete</button>
                </div>
            `;
        }
    });

    function deleteTask(id) {
        if(confirm("Are you sure?")) {
            db.ref('tasks/' + id).remove();
        }
    }
</script>

</body>
</html>
