<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - EarnBearn Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #f3ba2f; --bg: #0b0e11; --card: #1e2329; --border: #323539; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; padding: 20px; }
        .admin-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        h2 { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: #161a1e; color: #fff; }
        button { background: var(--gold); color: #000; font-weight: bold; border: none; cursor: pointer; }
        button:hover { opacity: 0.8; }
        .item-list { margin-top: 15px; }
        .item { display: flex; justify-content: space-between; background: #2b2f36; padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 14px; }
        .del-btn { background: #f6465d; width: auto; padding: 5px 10px; margin: 0; }
        .status-success { color: #2ebd85; font-weight: bold; }
    </style>
</head>
<body>

    <h1><i class="fas fa-user-shield"></i> EarnBearn Admin Panel</h1>

    <div class="admin-card">
        <h2><i class="fas fa-plus-circle"></i> Add New Task</h2>
        <input type="text" id="tTitle" placeholder="Task Title (e.g. Subscribe Youtube)">
        <input type="text" id="tLink" placeholder="Task URL (https://...)">
        <input type="number" id="tReward" placeholder="Reward Amount (e.g. 0.05)" step="0.01">
        <button onclick="addTask()">ADD TASK</button>
        <div id="taskList" class="item-list"></div>
    </div>

    <div class="admin-card">
        <h2><i class="fas fa-wallet"></i> Manage Payment Methods</h2>
        <input type="text" id="mName" placeholder="Method Name (e.g. Bkash / Binance / UID)">
        <button onclick="addMethod()" style="background: #2ebd85; color: #fff;">ADD METHOD</button>
        <div id="methodList" class="item-list"></div>
    </div>

    <div class="admin-card">
        <h2><i class="fas fa-hand-holding-usd"></i> Pending Withdrawals</h2>
        <div id="withdrawList" class="item-list"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAMFOgXzlihlgrKgrVR5puOA7tE9_0KAIY",
            databaseURL: "https://free-income-8a793-default-rtdb.firebaseio.com",
            projectId: "free-income-8a793"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- Task Functions ---
        function addTask() {
            const title = document.getElementById('tTitle').value;
            const link = document.getElementById('tLink').value;
            const reward = parseFloat(document.getElementById('tReward').value);
            if(!title || !link || !reward) return alert("Fill all fields");
            db.ref('tasks').push({ title, link, reward, status: "on" });
            alert("Task Added!");
        }

        db.ref('tasks').on('value', s => {
            let h = ""; s.forEach(c => {
                h += `<div class="item"><span>${c.val().title} ($${c.val().reward})</span> 
                <button class="del-btn" onclick="deleteNode('tasks/${c.key}')">Delete</button></div>`;
            });
            document.getElementById('taskList').innerHTML = h;
        });

        // --- Method Functions (নতুন লজিক) ---
        function addMethod() {
            const name = document.getElementById('mName').value;
            if(!name) return alert("Enter method name");
            db.ref('methods').push({ name });
            document.getElementById('mName').value = "";
            alert("Method Added!");
        }

        db.ref('methods').on('value', s => {
            let h = ""; s.forEach(c => {
                h += `<div class="item"><span><i class="fas fa-check"></i> ${c.val().name}</span> 
                <button class="del-btn" onclick="deleteNode('methods/${c.key}')">Remove</button></div>`;
            });
            document.getElementById('methodList').innerHTML = h;
        });

        // --- Withdraw Requests ---
        db.ref('withdrawRequests').on('value', s => {
            let h = ""; s.forEach(c => {
                const r = c.val();
                if(r.status === "Pending") {
                    h += `<div class="item" style="flex-direction:column; gap:5px;">
                        <span><b>User:</b> ${r.name} | <b>Amt:</b> $${r.amt}</span>
                        <span><b>Method:</b> ${r.mtd} | <b>Details:</b> ${r.adr}</span>
                        <button onclick="approveWithdraw('${c.key}')" style="background:#2ebd85; margin:5px 0;">APPROVE & PAY</button>
                    </div>`;
                }
            });
            document.getElementById('withdrawList').innerHTML = h || "No pending requests.";
        });

        function approveWithdraw(key) {
            if(confirm("Mark as Paid?")) {
                db.ref('withdrawRequests/' + key).update({ status: "Success" });
                alert("Updated!");
            }
        }

        function deleteNode(path) { if(confirm("Are you sure?")) db.ref(path).remove(); }
    </script>
</body>
</html>
