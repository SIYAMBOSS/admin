<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>SIYAMBOSS - Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; padding: 20px; }
        .box { background: #16213e; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; background: #00d2ff; color: #1a1a2e; padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .item { background: #0f3460; padding: 10px; margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Admin Control</h2>
        <input id="n" type="text" placeholder="Task Name">
        <input id="l" type="text" placeholder="Link (https://...)">
        <input id="r" type="number" placeholder="Reward (TK)">
        <button onclick="add()">Add Task</button>
        <div id="list"></div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAMFOgXzlihlgrKgrVR5puOA7tE9_0KAIY",
            databaseURL: "https://free-income-8a793-default-rtdb.firebaseio.com",
            projectId: "free-income-8a793"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function add() {
            const name = document.getElementById('n').value;
            const link = document.getElementById('l').value;
            const reward = document.getElementById('r').value;
            if(name && link && reward) {
                db.ref('tasks').push({ name, link, reward: parseFloat(reward) });
                alert("অ্যাড হয়েছে!");
            }
        }

        db.ref('tasks').on('value', s => {
            const d = s.val(); const list = document.getElementById('list'); list.innerHTML = "<h3>Active Tasks</h3>";
            for(let id in d) {
                list.innerHTML += `<div class="item"><span>${d[id].name}</span><button style="width:auto; padding:5px; background:red;" onclick="db.ref('tasks/${id}').remove()">X</button></div>`;
            }
        });
    </script>
</body>
</html>
