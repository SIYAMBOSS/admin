<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnBearn Pro - Siyam Boss</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #f3ba2f; --bg: #0b0e11; --card: #1e2329; --border: #323539; --text: #848e9c; --green: #2ebd85; --red: #f6465d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; padding-bottom: 90px; }

        .container { padding: 15px; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .active-sec { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI Cards */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .balance-title { font-size: 12px; color: var(--text); margin-bottom: 5px; }
        .balance-value { font-size: 32px; font-weight: 800; color: var(--gold); }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #181a20; display: flex; padding: 10px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--text); font-size: 10px; cursor: pointer; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }
        .nav-item.active-nav { color: var(--gold); }

        /* Trade UI */
        .trade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .trade-btn { padding: 15px; border: none; border-radius: 12px; font-weight: bold; color: #fff; cursor: pointer; font-size: 16px; }
        .btn-up { background: var(--green); }
        .btn-down { background: var(--red); }
        .trade-input { width: 100%; padding: 12px; border-radius: 10px; background: #000; border: 1px solid var(--border); color: #fff; text-align: center; margin-bottom: 10px; font-size: 18px; }

        /* Team UI */
        .team-box { display: flex; justify-content: space-between; align-items: center; background: #161a1e; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px dashed var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div id="home" class="section active-sec">
        <div class="card" style="text-align: center;">
            <div class="balance-title">TOTAL ASSETS</div>
            <div class="balance-value">$<span id="mainBal">0.0000</span></div>
            <div style="font-size: 11px; color: var(--green); margin-top: 5px;"><i class="fas fa-bolt"></i> Server Connected</div>
        </div>
        <div id="taskList"></div>
    </div>

    <div id="task" class="section">
        <h3 style="color:var(--gold)">Daily Missions</h3>
        <div id="dailyTasks"></div>
    </div>

    <div id="trade" class="section">
        <div class="card" style="text-align: center;">
            <h3 style="margin:0; color:var(--gold)">Live Trading</h3>
            <p style="font-size:11px; color:var(--text)">Next draw in <span id="timer">00:30</span></p>
            <input type="number" id="tradeAmt" class="trade-input" placeholder="Stake Amount">
            <div class="trade-grid">
                <button class="trade-btn btn-up" onclick="placeTrade('UP')">UP (1.9x)</button>
                <button class="trade-btn btn-down" onclick="placeTrade('DOWN')">DOWN (1.9x)</button>
            </div>
        </div>
        <div id="tradeLog" style="font-size: 12px; color: var(--text); padding: 10px;"></div>
    </div>

    <div id="wallet" class="section">
        <div class="card">
            <div class="balance-title">AVAILABLE TO WITHDRAW</div>
            <div class="balance-value">$<span id="wBal">0.0000</span></div>
            <hr style="border:0.5px solid var(--border); margin:15px 0;">
            <input type="text" id="wAddr" class="trade-input" style="font-size:14px" placeholder="Wallet Address">
            <input type="number" id="wAmt" class="trade-input" style="font-size:14px" placeholder="Withdraw Amount">
            <button onclick="requestWithdraw()" class="trade-btn" style="background:var(--gold); color:#000; width:100%">WITHDRAW</button>
        </div>
    </div>

    <div id="team" class="section">
        <div class="card">
            <h3 style="margin:0; color:var(--gold)">Referral Team</h3>
            <p style="font-size:12px; color:var(--text)">Invite friends and earn 10% bonus</p>
            <div class="team-box">
                <span id="refLink" style="font-size:11px">https://t.me/EarnBearnBot?start=...</span>
                <button onclick="copyRef()" style="background:var(--gold); border:none; border-radius:5px; padding:5px 10px; font-size:10px">COPY</button>
            </div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active-nav" onclick="showSec('home', this)"><i class="fas fa-home"></i>Home</div>
    <div class="nav-item" onclick="showSec('task', this)"><i class="fas fa-tasks"></i>Task</div>
    <div class="nav-item" onclick="showSec('trade', this)"><i class="fas fa-chart-line"></i>Trade</div>
    <div class="nav-item" onclick="showSec('wallet', this)"><i class="fas fa-wallet"></i>Wallet</div>
    <div class="nav-item" onclick="showSec('team', this)"><i class="fas fa-users"></i>Team</div>
</div>

<script>
    // --- Config & Initialization ---
    const firebaseConfig = {
        apiKey: "AIzaSyAMFOgXzlihlgrKgrVR5puOA7tE9_0KAIY",
        databaseURL: "https://free-income-8a793-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    const user = tg.initDataUnsafe.user || { id: "123456", first_name: "User" };
    const userRef = db.ref('users/' + user.id);

    function showSec(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById(id).classList.add('active-sec');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        el.classList.add('active-nav');
        tg.HapticFeedback.selectionChanged();
    }

    // --- Sync Data ---
    userRef.on('value', snap => {
        let val = snap.val() || { balance: 0 };
        let b = (val.balance || 0).toFixed(4);
        document.getElementById('mainBal').innerText = b;
        document.getElementById('wBal').innerText = b;
        document.getElementById('refLink').innerText = "https://t.me/EarnBearnBot?start=" + user.id;
    });

    // --- Trading Feature ---
    function placeTrade(dir) {
        let amt = parseFloat(document.getElementById('tradeAmt').value);
        if(amt < 0.1 || isNaN(amt)) return alert("Minimum stake $0.1");

        userRef.once('value', s => {
            let currentBal = s.val().balance || 0;
            if(currentBal < amt) return alert("Insufficient Balance");

            userRef.update({ balance: currentBal - amt });
            alert("Trade placed on " + dir + ". Waiting for result...");

            setTimeout(() => {
                let win = Math.random() > 0.5;
                if(win) {
                    let winAmt = amt * 1.9;
                    userRef.update({ balance: (currentBal - amt) + winAmt });
                    alert("Congratulations! You won $" + winAmt.toFixed(2));
                } else {
                    alert("Trade Lost. Better luck next time!");
                }
            }, 3000);
        });
    }

    // --- Tasks ---
    db.ref('tasks').on('value', s => {
        let html = "";
        s.forEach(t => {
            let task = t.val();
            html += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${task.title}</b><br><small>$${task.reward}</small></div>
                <button onclick="openTask('${task.link}', ${task.reward})" style="background:var(--gold); border:none; padding:8px 15px; border-radius:8px">Claim</button>
            </div>`;
        });
        document.getElementById('dailyTasks').innerHTML = html;
        document.getElementById('taskList').innerHTML = html; // Mirror on Home
    });

    function openTask(link, reward) {
        tg.openLink(link);
        setTimeout(() => {
            userRef.once('value', s => {
                userRef.update({ balance: (s.val().balance || 0) + reward });
                alert("Reward Collected!");
            });
        }, 5000);
    }

    // --- Withdraw ---
    function requestWithdraw() {
        let amt = document.getElementById('wAmt').value;
        if(amt < 1) return alert("Min withdraw $1");
        alert("Withdrawal request sent for processing!");
    }

    // Timer Logic
    setInterval(() => {
        let t = document.getElementById('timer');
        let sec = parseInt(t.innerText.split(':')[1]);
        sec = sec <= 0 ? 30 : sec - 1;
        t.innerText = "00:" + (sec < 10 ? '0' + sec : sec);
    }, 1000);

</script>
</body>
</html>
