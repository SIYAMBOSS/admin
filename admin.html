<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #2c3e50; color: white; }
        .box { background: #34495e; padding: 20px; border-radius: 10px; margin-bottom: 10px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #27ae60; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Admin Dashboard</h2>
    <div class="box">
        <h3>নতুন টাস্ক যোগ করুন</h3>
        <input id="tName" type="text" placeholder="টাস্কের নাম (যেমন: YouTube Subscribe)">
        <input id="tLink" type="text" placeholder="লিঙ্ক (https://...)">
        <input id="tReward" type="number" placeholder="কত টাকা দিতে চান?">
        <button onclick="saveTask()">Add Task</button>
    </div>

    <script>
        // আপনার Firebase Config এখানেও বসান
        const firebaseConfig = {
            apiKey: "AIzaSyAMFOgXzlihlgrKgrVR5puOA7tE9_0KAIY",
            databaseURL: "https://free-income-8a793-default-rtdb.firebaseio.com",
            projectId: "free-income-8a793"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function saveTask() {
            const name = document.getElementById('tName').value;
            const link = document.getElementById('tLink').value;
            const reward = document.getElementById('tReward').value;
            if(name && link && reward) {
                db.ref('tasks').push({ name, link, reward });
                alert("টাস্ক অ্যাড হয়েছে!");
                location.reload();
            }
        }
    </script>
</body>
</html>
