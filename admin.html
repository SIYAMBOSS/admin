<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIYAMBOSS - Master Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #f3ba2f; --bg: #0b0e11; --card: #1e2329; --border: #323539; --green: #2ebd85; --red: #f6465d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        
        h2, h3 { color: var(--gold); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; background: #2b2f36; border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-add { background: var(--gold); color: #000; }
        .btn-broadcast { background: #5d5fef; color: #fff; }
        .btn-clear { background: var(--red); color: #fff; }
        .btn-approve { background: var(--green); color: #fff; padding: 5px 10px; width: auto; font-size: 12px; }
        .btn-reject { background: var(--red); color: #fff; padding: 5px 10px; width: auto; font-size: 12px; }

        .list-item { background: #2b2f36; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: var(--gold);"><i class="fas fa-user-shield"></i> SIYAMBOSS ADMIN</h1>

    <div class="admin-grid">
        
        <div class="card">
            <h3><i class="fas fa-bullhorn"></i> Global Broadcast (SMS)</h3>
            <textarea id="broadcastMsg" placeholder="Type message for all users..."></textarea>
            <button class="btn-broadcast" onclick="sendBroadcast()">SEND TO ALL USERS</button>
            <button class="btn-clear" onclick="clearBroadcast()" style="margin-top:10px;">HIDE NOTIFICATION</button>
        </div>

        <div class="card">
            <h3><i class="fas fa-plus-circle"></i> Add New Task</h3>
            <input type="text" id="tTitle" placeholder="Task Title (e.g. Join Telegram)">
            <input type="text" id="tLink" placeholder="Task Link (https://...)">
            <input type="number" step="0.0001" id="tReward" placeholder="Reward Amount ($)">
            <input type="number" id="tTarget" placeholder="Target Members Count">
            <button class="btn-add" onclick="addTask()">PUBLISH TASK</button>
        </div>

        <div class="card">
            <h3><i class="fas fa-money-bill-wave"></i> Pending Withdrawals</h3>
            <div id="payoutList">Loading requests...</div>
        </div>

        <div class="card">
            <h3><i class="fas fa-users"></i> Users Control</h3>
            <input type="text" id="searchUser" placeholder="Enter User ID to modify balance">
            <input type="number" id="newBal" placeholder="New Balance Value">
            <button class="btn-add" onclick="updateUserBalance()">UPDATE BALANCE</button>
            <div id="userStats" style="margin-top:15px; font-size:12px; color:var(--text-gray);"></div>
        </div>

    </div>

    <div class="card">
        <h3><i class="fas fa-list"></i> Active Task Management</h3>
        <div id="adminTaskList"></div>
    </div>

    <script>
        // --- YOUR FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAMFOgXzlihlgrKgrVR5puOA7tE9_0KAIY",
            databaseURL: "https://free-income-8a793-default-rtdb.firebaseio.com",
            projectId: "free-income-8a793"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Send Broadcast
        function sendBroadcast() {
            const msg = document.getElementById('broadcastMsg').value;
            if(!msg) return alert("Enter message!");
            db.ref('broadcast').set(msg).then(() => alert("Broadcast sent successfully!"));
        }

        function clearBroadcast() {
            db.ref('broadcast').set(null).then(() => alert("Notification hidden from users."));
        }

        // 2. Add Task
        function addTask() {
            const title = document.getElementById('tTitle').value;
            const link = document.getElementById('tLink').value;
            const reward = parseFloat(document.getElementById('tReward').value);
            const target = parseInt(document.getElementById('tTarget').value);

            if(!title || !link || !reward) return alert("Fill all fields!");

            const taskData = {
                title: title,
                link: link,
                reward: reward,
                targetMembers: target,
                completedCount: 0,
                status: "on"
            };

            db.ref('tasks').push(taskData).then(() => {
                alert("Task Added!");
                location.reload();
            });
        }

        // 3. Load Withdrawals
        db.ref('withdrawals').on('value', s => {
            const list = document.getElementById('payoutList');
            list.innerHTML = "";
            s.forEach(child => {
                const w = child.val();
                if(w.status === "Pending") {
                    list.innerHTML += `
                        <div class="list-item">
                            <div>
                                <b>${w.userName}</b> ($${w.amount})<br>
                                <small>${w.exchange}: ${w.address}</small>
                            </div>
                            <div>
                                <button class="btn-approve" onclick="managePayout('${child.key}', 'Approved')">OK</button>
                                <button class="btn-reject" onclick="managePayout('${child.key}', 'Rejected')">X</button>
                            </div>
                        </div>`;
                }
            });
        });

        function managePayout(id, status) {
            db.ref('withdrawals/' + id).update({ status: status })
            .then(() => alert("Status updated to: " + status));
        }

        // 4. Update User Balance
        function updateUserBalance() {
            const uid = document.getElementById('searchUser').value;
            const bal = parseFloat(document.getElementById('newBal').value);
            if(!uid) return alert("Enter User ID");
            db.ref('users/' + uid).update({ balance: bal })
            .then(() => alert("Balance updated for UID: " + uid));
        }

        // 5. Load Active Tasks for Deletion
        db.ref('tasks').on('value', s => {
            const list = document.getElementById('adminTaskList');
            list.innerHTML = "";
            s.forEach(child => {
                const t = child.val();
                list.innerHTML += `
                    <div class="list-item">
                        <span>${t.title} ($${t.reward}) - ${t.completedCount}/${t.targetMembers}</span>
                        <button class="btn-reject" onclick="deleteTask('${child.key}')">DELETE</button>
                    </div>`;
            });
        });

        function deleteTask(id) {
            if(confirm("Are you sure?")) db.ref('tasks/' + id).remove();
        }

    </script>
</body>
</html>
